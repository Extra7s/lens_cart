version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: lenscart-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: lenscart
    volumes:
      - mongo_data:/data/db
    networks:
      - lenscart-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lenscart-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/lenscart
      JWT_SECRET: ${JWT_SECRET:-lenscart_change_in_production}
      CLIENT_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - lenscart-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_DEMO_MODE: "false"
    container_name: lenscart-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - lenscart-net

volumes:
  mongo_data:

networks:
  lenscart-net:
    driver: bridge
